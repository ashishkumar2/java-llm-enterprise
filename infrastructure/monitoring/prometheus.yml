global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway-service'
    static_configs:
      - targets: ['localhost:8080']

  - job_name: 'ai-orchestrator-service'
    static_configs:
      - targets: ['localhost:8081']

  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['localhost:8082']

  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093
